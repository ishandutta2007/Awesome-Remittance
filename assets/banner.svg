<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A2980" />
      <stop offset="100%" stop-color="#26D0CE" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
  </defs>
  
  <rect width="800" height="200" fill="url(#bg)" rx="15" ry="15"/>
  
  <!-- Dynamic animated circles for remittance flow -->
  <circle cx="100" cy="100" r="40" fill="url(#glow)">
    <animate attributeName="r" values="30;50;30" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="700" cy="100" r="40" fill="url(#glow)">
    <animate attributeName="r" values="30;50;30" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="4s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Flow lines connecting them -->
  <line x1="150" y1="100" x2="650" y2="100" stroke="#ffffff" stroke-width="2" stroke-dasharray="10, 10" opacity="0.6">
    <animate attributeName="stroke-dashoffset" from="100" to="0" dur="2s" repeatCount="indefinite"/>
  </line>
  
  <text x="400" y="110" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="2">
    AWESOME REMITTANCE
  </text>
  <text x="400" y="145" font-family="Arial, sans-serif" font-size="18" font-weight="normal" fill="#e0f7fa" text-anchor="middle">
    Top Platforms for Global Money Transfers
  </text>
</svg>
